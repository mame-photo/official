<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mame photography</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #433d3c;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Shippori Mincho', serif;
            overflow-x: hidden;
        }

        /* 眩しい光の演出用レイヤー */
        #light-overlay {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 1000;
            pointer-events: none;
        }

        nav {
            position: fixed;
            top: 0; width: 100%;
            display: flex; justify-content: center; gap: 30px;
            padding: 30px 0;
            z-index: 100;
            font-size: 0.7rem; letter-spacing: 0.3em;
            opacity: 0;
        }
        nav a { text-decoration: none; color: var(--text-color); }

        /* メインビジュアル */
        .hero {
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            position: relative;
            background: #fff;
        }

        .bg-photo-wrapper {
            width: 75%;
            max-width: 400px;
            height: 70vh;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.03);
        }

        .bg-photo {
            width: 100%;
            height: 120%; /* 視差効果のために少し大きく */
            object-fit: cover;
            filter: blur(10px); /* 最初はボケている */
            transform: scale(1.1);
        }

        .title-img {
            position: absolute;
            width: 280px;
            z-index: 10;
            filter: brightness(2); /* 最初は光りすぎている */
            opacity: 0;
        }

        .logo-img {
            position: absolute;
            width: 140px;
            bottom: 12%;
            opacity: 0;
            z-index: 10;
        }

        /* コンテンツエリア */
        .content-wrapper { 
            position: relative;
            background: #fff; 
            padding: 100px 30px;
            z-index: 5;
        }
        
        .about-section {
            text-align: center;
            margin-bottom: 150px;
            opacity: 0;
            transform: translateY(30px);
        }

        .gallery-h {
            display: flex; gap: 20px;
            overflow-x: auto;
            padding-bottom: 50px;
        }
        .gallery-h::-webkit-scrollbar { display: none; }
        
        .gallery-item {
            flex: 0 0 85%;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }
        .gallery-item img { width: 100%; height: 60vh; object-fit: cover; transition: 0.8s ease; }
        .gallery-item:hover img { transform: scale(1.05); }

        .gallery-label {
            position: absolute; inset: 0;
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.1);
            color: #fff; font-size: 1.2rem; letter-spacing: 0.4em;
            text-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        footer { padding: 80px 0; text-align: center; font-size: 0.6rem; color: #aaa; }
    </style>
</head>
<body>

    <div id="light-overlay"></div>

    <nav id="nav">
        <a href="#about">ABOUT</a>
        <a href="#gallery">GALLERY</a>
        <a href="#price">PRICE</a>
        <a href="#contact">CONTACT</a>
    </nav>

    <div class="hero">
        <div class="bg-photo-wrapper">
            <img src="DSC06066 編集済み 1-1.jpg" alt="背景" class="bg-photo" id="bg-photo">
        </div>
        <img src="わたしのたからもの.png" alt="タイトル" class="title-img" id="title-img">
        <img src="10.png" alt="ロゴ" class="logo-img" id="logo-img">
    </div>

    <div class="content-wrapper">
        <div class="about-section" id="about">
            <p style="line-height: 3; letter-spacing: 0.2em;">
                北海道のど真ん中。<br>
                たきかわ市在住の<br>
                フリーランスフォトグラファー mameです。<br>
                のぞいていってやってください。
            </p>
        </div>

        <div class="gallery-h" id="gallery">
            <a href="https://www.canva.com/design/DAG_vNAX1Zo/aj9td3SjPxeNIeQSJFuKAw/edit?utm_content=DAG_vNAX1Zo&utm_campaign=designshare&utm_medium=link2&utm_source=sharebutton" class="gallery-item"><img src="DSC08711.jpg"><span class="gallery-label">七五三</span></a>
            <a href="#" class="gallery-item"><img src="gallery_furisode.jpg"><span class="gallery-label">振袖</span></a>
            <a href="#" class="gallery-item"><img src="gallery_birthday.jpg"><span class="gallery-label">バースデー</span></a>
        </div>
    </div>

    <footer>© MAME PHOTOGRAPHY</footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- オープニングアニメーション ---
        const tl = gsap.timeline();

        tl.to("#light-overlay", {
            opacity: 0,
            duration: 2.5,
            ease: "power2.inOut"
        })
        .to("#title-img", {
            opacity: 1,
            filter: "brightness(1)",
            duration: 2,
            ease: "power2.out"
        }, "-=1.5")
        .to("#bg-photo", {
            filter: "blur(0px)",
            scale: 1,
            duration: 3,
            ease: "power2.out"
        }, "-=2")
        .to(["#logo-img", "#nav"], {
            opacity: 1,
            duration: 1.5
        }, "-=1.5");

        // --- スクロール連動：視差効果 ---
        gsap.to("#bg-photo", {
            yPercent: 20,
            ease: "none",
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                end: "bottom top",
                scrub: true
            }
        });

        // --- スクロール連動：自己紹介の浮き上がり ---
        gsap.to(".about-section", {
            opacity: 1,
            y: 0,
            duration: 1.5,
            scrollTrigger: {
                trigger: ".about-section",
                start: "top 85%",
            }
        });
    </script>
</body>
</html>
