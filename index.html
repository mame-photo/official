<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mame photography</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #433d3c;
            --white: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Shippori Mincho', serif;
            overflow-x: hidden;
        }

        /* 眩しい光の演出用レイヤー */
        #light-overlay {
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 1000;
            pointer-events: none;
        }

        /* 上部メニュー */
        nav {
            position: fixed;
            top: 0; width: 100%;
            display: flex; justify-content: center; gap: 30px;
            padding: 30px 0;
            z-index: 100;
            font-size: 0.75rem; letter-spacing: 0.3em;
            opacity: 0;
        }
        nav a { 
            text-decoration: none; 
            color: var(--white); /* 動画の上で見やすいように白 */
            text-shadow: 0 0 10px rgba(0,0,0,0.3);
            transition: opacity 0.3s;
        }
        nav a:hover { opacity: 0.6; }

        /* ビデオヒーローセクション */
        .hero {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            background: #000; /* 動画読み込み前の背景色 */
        }

        /* 動画の設定 */
        .video-background {
            position: absolute;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
        }

        /* 動画の上の薄い膜（これを入れると文字が見やすくなり、プロっぽくなります） */
        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.15); /* 15%だけ黒を重ねる */
            z-index: 2;
        }

        /* 中央のロゴ */
        .center-content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .logo-main {
            width: 200px; /* お好みのサイズに調整 */
            max-width: 80%;
            opacity: 0;
            filter: brightness(0) invert(1); /* 黒いロゴを白く反転させる場合に使用。不要なら消してください */
        }

        .title-sub {
            width: 280px;
            max-width: 70%;
            margin-bottom: 20px;
            opacity: 0;
        }

        /* コンテンツ（自己紹介以降） */
        .main-content {
            position: relative;
            z-index: 20;
            background: #fff;
            padding: 100px 30px;
        }

        .about-text {
            text-align: center;
            line-height: 3;
            letter-spacing: 0.2em;
            max-width: 600px;
            margin: 0 auto;
        }

        footer { padding: 80px 0; text-align: center; font-size: 0.6rem; color: #aaa; }
    </style>
</head>
<body>

    <div id="light-overlay"></div>

    <nav id="nav">
        <a href="#about">ABOUT</a>
        <a href="#gallery">GALLERY</a>
        <a href="#price">PRICE</a>
        <a href="#contact">CONTACT</a>
    </nav>

    <section class="hero">
        <video autoplay muted loop playsinline class="video-background">
            <source src="ホームページ用動画.mov" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="video-overlay"></div>

        <div class="center-content">
            <img src="わたしのたからもの.png" alt="title" class="title-sub" id="title-img">
            <br>
            <img src="10.png" alt="logo" class="logo-main" id="logo-img">
        </div>
    </section>

    <div class="main-content" id="about">
        <div class="about-text">
            北海道のど真ん中。<br>
            たきかわ市在住のフリーランスフォトグラファー<br>
            mameです。<br><br>
            のぞいていってやってください。
        </div>
    </div>

    <footer>© MAME PHOTOGRAPHY</footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- オープニングアニメーション ---
        const tl = gsap.timeline();

        tl.to("#light-overlay", {
            opacity: 0,
            duration: 2.5,
            ease: "power2.inOut"
        })
        .to("#title-img", {
            opacity: 1,
            duration: 2,
            ease: "power2.out"
        }, "-=1.5")
        .to(["#logo-img", "#nav"], {
            opacity: 1,
            duration: 1.5,
            stagger: 0.3
        }, "-=1.0");

        // スクロール時に動画を少し暗くする演出
        gsap.to(".video-overlay", {
            background: "rgba(0,0,0,0.6)",
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                end: "bottom top",
                scrub: true
            }
        });
    </script>
</body>
</html>
