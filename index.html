<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mame photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #433d3c;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Shippori Mincho', serif;
            overflow-x: hidden;
        }

        /* 固定メニュー */
        nav {
            position: fixed;
            top: 0; width: 100%;
            display: flex; justify-content: center; gap: 20px;
            padding: 20px 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            z-index: 100;
            font-size: 0.7rem; letter-spacing: 0.2em;
            opacity: 0; /* 最初は隠す */
        }
        nav.show { opacity: 1; transition: opacity 1.5s ease; }
        nav a { text-decoration: none; color: var(--text-color); }

        /* メインビジュアルエリア */
        .hero {
            height: 92vh; /* コンセプトを少し見せるために少し短く設定 */
            display: flex; justify-content: center; align-items: center;
            position: relative; padding: 4vh 20px;
        }

        /* 背景：青空の写真 */
        .bg-photo {
            position: absolute;
            width: calc(100% - 40px); height: calc(100% - 40px);
            max-width: 500px;
            object-fit: cover;
            opacity: 0;
            transition: opacity 2s ease 1.5s;
        }

        /* ① わたしのたからもの */
        .title-img {
            position: absolute;
            width: 200px;
            transform: translateX(-30px);
            opacity: 0;
            z-index: 10;
        }

        /* ② ロゴ */
        .logo-img {
            position: absolute;
            width: 120px;
            bottom: 15%;
            opacity: 0;
            z-index: 10;
        }

        /* アニメーション用クラス */
        .fade-in-side { opacity: 1; transform: translateX(0); transition: all 1.5s ease; }
        .fade-in-slow { opacity: 1; transition: opacity 2s ease 1s; }
        .visible { opacity: 1; }

        /* コンセプトセクション（見切れ演出） */
        .content-wrapper { padding: 0 30px; }
        
        .concept-section {
            padding: 40px 0 100px;
            text-align: center;
        }
        .concept-text {
            line-height: 2.5; font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        /* ⑤ 横スクロールギャラリー */
        .gallery-h {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 15px;
            padding-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }
        .gallery-h::-webkit-scrollbar { display: none; }
        .gallery-item {
            flex: 0 0 80%;
            scroll-snap-align: center;
        }
        .gallery-item img {
            width: 100%; height: 50vh;
            object-fit: cover;
        }

        footer { padding: 50px 0; text-align: center; font-size: 0.6rem; color: #ccc; }
    </style>
</head>
<body>

    <nav id="main-nav">
        <a href="#">ABOUT</a>
        <a href="#">GALLERY</a>
        <a href="#">PRICE</a>
        <a href="#">CONTACT</a>
    </nav>

    <div class="hero">
        <img src="DSC06066 編集済み 1-1.jpg" alt="背景" class="bg-photo" id="bg-photo">
        <img src="わたしのたからもの.png" alt="タイトル" class="title-img" id="title-img">
        <img src="10.png" alt="ロゴ" class="logo-img" id="logo-img">
    </div>

    <div class="content-wrapper">
        <div class="concept-section">
            <div class="concept-text">
                <p>何気ない一瞬が、<br>いつかかけがえのない記憶になる。</p>
                <p>そのままの、きみがいい。</p>
            </div>
        </div>

        <div class="gallery-h">
            <div class="gallery-item"><img src="DSC06066 編集済み 1-1.jpg"></div>
            <div class="gallery-item"><img src="マンスリーフォトバナー.jpg"></div>
            </div>
    </div>

    <footer>© MAME PHOTOGRAPHY</footer>

    <script>
        window.addEventListener('load', () => {
            const title = document.getElementById('title-img');
            const logo = document.getElementById('logo-img');
            const bg = document.getElementById('bg-photo');
            const nav = document.getElementById('main-nav');

            // ① サイドからタイトル
            setTimeout(() => {
                title.classList.add('fade-in-side');
            }, 500);

            // ② ロゴを浮かび上がらせる
            setTimeout(() => {
                logo.classList.add('fade-in-slow');
            }, 1200);

            // ③ 背景写真とメニューを表示
            setTimeout(() => {
                bg.classList.add('visible');
                nav.classList.add('show');
            }, 2000);
        });
    </script>
</body>
</html>
